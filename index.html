<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Meal Master – Discover delicious recipes from around the world. Search by name and explore cuisines, categories, and cooking instructions." />
  <title>Meal Master – Recipe Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>


  <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle theme">
    <span class="icon-sun">☀️</span>
    <span class="icon-moon">🌙</span>
  </button>


  <header id="site-header">
    <div class="header-inner">
      <div class="logo" id="logo">
        <span class="logo-icon">🍽️</span>
        <h1>Meal Master</h1>
      </div>
      <p class="tagline">Discover delicious recipes from around the world</p>
    </div>
  </header>


  <section id="search-section">
    <div class="search-wrapper">
      <div class="search-bar" id="search-bar">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input
          type="text"
          id="search-input"
          placeholder="Search for a meal… e.g. Chicken, Pasta, Cake"
          autocomplete="off"
        />
        <button id="search-btn" type="button">Search</button>
      </div>
      <div class="search-hints">
        <span>Try:</span>
        <button class="hint-chip" data-query="Chicken">Chicken</button>
        <button class="hint-chip" data-query="Pasta">Pasta</button>
        <button class="hint-chip" data-query="Cake">Cake</button>
        <button class="hint-chip" data-query="Seafood">Seafood</button>
      </div>
    </div>
  </section>


  <main id="meals-container">

    <div class="welcome-state" id="welcome-state">
      <div class="welcome-illustration">🔍</div>
      <h2>What are you craving today?</h2>
      <p>Search for any meal above and discover recipes from around the globe.</p>
    </div>
  </main>


  <footer id="site-footer">

  </footer>

  <script src="script.js"></script>
</body>
</html>
